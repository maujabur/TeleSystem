<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Redes Wi-Fi Salvas</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7eee9;
        --panel: #fffaf7;
        --text: #35231d;
        --muted: #7b6258;
        --line: #e1c8bb;
        --primary: #b84e2f;
        --primary-dark: #84331f;
        --soft: #fff4ee;
        --ok-bg: #edf7e8;
        --ok-text: #456b1b;
        --error-bg: #fdecea;
        --error-text: #8b2d2d;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Arial, Helvetica, sans-serif;
      }

      .shell {
        width: min(860px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0;
      }

      .tech-nav,
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .tech-nav {
        margin-bottom: 18px;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--line);
      }

      .tech-nav a {
        color: var(--primary-dark);
        font-weight: 700;
        text-decoration: none;
      }

      .tech-nav .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }

      header { margin-bottom: 18px; }

      h1, h2 { margin: 0; }
      h1 { font-size: 26px; }
      h2 { font-size: 16px; margin-bottom: 12px; }

      .subtle {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.45;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      .panel {
        margin-top: 14px;
        padding: 20px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 10px 28px rgba(98, 47, 28, 0.1);
      }

      button, a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 38px;
        padding: 0 14px;
        border: 0;
        border-radius: 8px;
        background: var(--primary);
        color: #fff;
        font: inherit;
        font-weight: 700;
        font-size: 14px;
        cursor: pointer;
        text-decoration: none;
      }

      button:hover, a.button:hover { background: var(--primary-dark); }

      .secondary {
        border: 1px solid var(--line);
        background: var(--soft);
        color: var(--primary-dark);
      }

      .secondary:hover { background: #f8e5da; }

      .danger {
        background: #c0392b;
      }

      .danger:hover { background: #922b21; }

      .banner {
        display: none;
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 8px;
        font-size: 14px;
      }

      .banner.show { display: block; }

      .ok { background: var(--ok-bg); color: var(--ok-text); }
      .error { background: var(--error-bg); color: var(--error-text); }

      .network-list { list-style: none; margin: 0; padding: 0; }

      .network-item {
        display: grid;
        grid-template-columns: 1fr auto auto auto;
        align-items: center;
        gap: 10px;
        padding: 12px 0;
        border-bottom: 1px solid var(--line);
      }

      .network-item:last-child { border-bottom: none; }

      .net-ssid {
        font-weight: 700;
        overflow-wrap: anywhere;
      }

      .net-priority-group {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .net-priority-group label {
        font-size: 13px;
        color: var(--muted);
        white-space: nowrap;
      }

      .net-priority-group input[type=number] {
        width: 70px;
        padding: 6px 8px;
        border: 1px solid var(--line);
        border-radius: 6px;
        font: inherit;
        font-size: 14px;
        background: var(--soft);
        color: var(--text);
      }

      .order-btns {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .order-btns button {
        min-height: 26px;
        padding: 0 10px;
        font-size: 13px;
        font-weight: normal;
        background: var(--soft);
        color: var(--primary-dark);
        border: 1px solid var(--line);
      }

      .order-btns button:hover { background: #f8e5da; }

      .empty-msg {
        color: var(--muted);
        font-size: 14px;
        padding: 12px 0;
        text-align: center;
      }

      @media (max-width: 600px) {
        .network-item {
          grid-template-columns: 1fr auto;
          grid-template-rows: auto auto;
        }

        .order-btns { flex-direction: row; }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <nav class="tech-nav" aria-label="Navegacao tecnica">
        <a href="/">Inicio</a>
        <div class="links">
          <a href="/status">Status</a>
          <a href="/networks">Redes</a>
          <a href="/ota">OTA</a>
          <a href="/settings">Ajustes</a>
          <a href="/logs">Logs</a>
        </div>
      </nav>

      <header>
        <div>
          <h1>Redes Wi-Fi Salvas</h1>
          <p class="subtle">Prioridade maior = preferida. O dispositivo tenta a rede de maior prioridade disponivel primeiro.</p>
        </div>
        <div class="actions">
          <button class="secondary" type="button" onclick="loadNetworks()">Atualizar</button>
        </div>
      </header>

      <section class="panel">
        <ul id="netList" class="network-list">
          <li class="empty-msg">Carregando...</li>
        </ul>
      </section>

      <div id="banner" class="banner" role="alert"></div>
    </main>

    <script>
      var networks = [];
      var displayedNetworks = [];

      function showBanner(msg, isError) {
        var b = document.getElementById('banner');
        b.textContent = msg;
        b.className = 'banner show ' + (isError ? 'error' : 'ok');
        clearTimeout(b._timer);
        b._timer = setTimeout(function () { b.className = 'banner'; }, 4000);
      }

      function renderList() {
        var ul = document.getElementById('netList');
        if (!networks.length) {
          ul.innerHTML = '<li class="empty-msg">Nenhuma rede salva.</li>';
          return;
        }

        // Sort descending by priority for display
        displayedNetworks = networks.slice().sort(function (a, b) { return b.priority - a.priority; });

        ul.innerHTML = displayedNetworks.map(function (net, idx) {
          var ssidEsc = escHtml(net.ssid);
          return '<li class="network-item">' +
            '<span class="net-ssid">' + ssidEsc + '</span>' +
            '<div class="order-btns">' +
              '<button type="button" title="Aumentar prioridade" onclick="adjustPriorityByIndex(' + idx + ',1)">&#9650;</button>' +
              '<button type="button" title="Diminuir prioridade" onclick="adjustPriorityByIndex(' + idx + ',-1)">&#9660;</button>' +
            '</div>' +
            '<div class="net-priority-group">' +
              '<label for="pri-' + idx + '">Prioridade</label>' +
              '<input id="pri-' + idx + '" type="number" value="' + net.priority + '" ' +
                '/>' +
              '<button type="button" onclick="savePriorityInputByIndex(' + idx + ')">Salvar</button>' +
            '</div>' +
            '<button class="danger" type="button" onclick="deleteNetworkByIndex(' + idx + ')">Excluir</button>' +
          '</li>';
        }).join('');
      }

      function escHtml(str) {
        return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function loadNetworks() {
        fetch('/api/wifi/saved')
          .then(function (r) { return r.json(); })
          .then(function (data) {
            networks = data.saved_networks || [];
            renderList();
          })
          .catch(function () { showBanner('Falha ao carregar redes.', true); });
      }

      function findNetwork(ssid) {
        for (var i = 0; i < networks.length; i++) {
          if (networks[i].ssid === ssid) return networks[i];
        }
        return null;
      }

      function adjustPriorityByIndex(index, delta) {
        var selected = displayedNetworks[index];
        if (!selected) return;
        var ssid = selected.ssid;
        var net = findNetwork(ssid);
        if (!net) return;
        setPriority(ssid, net.priority + delta);
      }

      function savePriorityInputByIndex(index) {
        var selected = displayedNetworks[index];
        if (!selected) return;
        var ssid = selected.ssid;
        var input = document.getElementById('pri-' + index);
        if (!input) return;
        var val = input.value;
        var p = parseInt(val, 10);
        if (isNaN(p)) { showBanner('Prioridade invalida.', true); return; }
        setPriority(ssid, p);
      }

      function setPriority(ssid, priority) {
        fetch('/api/wifi/saved', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ssid: ssid, priority: priority })
        })
          .then(function (r) {
            if (!r.ok) return r.text().then(function (t) { throw new Error(t); });
            var net = findNetwork(ssid);
            if (net) net.priority = priority;
            renderList();
            showBanner('Prioridade de "' + ssid + '" atualizada para ' + priority + '.', false);
          })
          .catch(function (e) { showBanner('Erro: ' + e.message, true); });
      }

      function deleteNetworkByIndex(index) {
        var selected = displayedNetworks[index];
        if (!selected) return;
        var ssid = selected.ssid;
        if (!confirm('Excluir rede "' + ssid + '"?')) return;
        fetch('/api/wifi/saved', {
          method: 'DELETE',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ ssid: ssid })
        })
          .then(function (r) {
            if (!r.ok) return r.text().then(function (t) { throw new Error(t); });
            networks = networks.filter(function (n) { return n.ssid !== ssid; });
            renderList();
            showBanner('Rede "' + ssid + '" removida.', false);
          })
          .catch(function (e) { showBanner('Erro: ' + e.message, true); });
      }

      loadNetworks();
    </script>
  </body>
</html>
