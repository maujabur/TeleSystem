<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TeleSystem - Ajustes</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #0f172a;
        --panel: #111827;
        --field: #1f2937;
        --text: #f8fafc;
        --muted: #94a3b8;
        --accent: #22c55e;
        --danger: #ef4444;
        --border: rgba(148, 163, 184, 0.25);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
      }

      .shell {
        width: min(100% - 32px, 980px);
        margin: 0 auto;
        padding: 24px 0;
      }

      .tech-nav,
      header,
      .grid {
        display: grid;
        gap: 16px;
      }

      .tech-nav {
        grid-template-columns: auto 1fr;
        align-items: center;
        margin-bottom: 24px;
      }

      .links,
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: flex-end;
      }

      a {
        color: var(--muted);
        text-decoration: none;
      }

      a:hover { color: var(--text); }

      header {
        grid-template-columns: 1fr auto;
        align-items: center;
        margin-bottom: 16px;
      }

      h1,
      p {
        margin: 0;
      }

      h1 { font-size: 1.6rem; }

      .subtle,
      label {
        color: var(--muted);
      }

      .subtle { margin-top: 6px; }

      details {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--panel);
        margin-bottom: 14px;
      }

      summary {
        cursor: pointer;
        padding: 14px 16px;
        font-weight: 700;
      }

      .content {
        border-top: 1px solid var(--border);
        padding: 16px;
      }

      .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        align-items: end;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 0.9rem;
      }

      input,
      select {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 9px 10px;
        background: var(--field);
        color: var(--text);
      }

      button {
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 10px 14px;
        min-height: 42px;
        background: var(--accent);
        color: #052e16;
        font-weight: 700;
        cursor: pointer;
      }

      button.secondary {
        background: transparent;
        color: var(--text);
      }

      button.danger {
        background: var(--danger);
        color: #fff;
      }

      .readout {
        margin-top: 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 12px;
        background: var(--field);
        color: var(--muted);
        overflow-wrap: anywhere;
      }

      .banner {
        display: none;
        border-radius: 8px;
        padding: 12px;
        margin-top: 16px;
      }

      .banner.show { display: block; }
      .banner.ok { background: rgba(34, 197, 94, 0.14); }
      .banner.error { background: rgba(239, 68, 68, 0.16); }

      @media (max-width: 760px) {
        .shell { width: min(100% - 24px, 980px); }
        .tech-nav,
        header,
        .grid {
          grid-template-columns: 1fr;
        }
        .links,
        .actions {
          justify-content: flex-start;
        }
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <nav class="tech-nav" aria-label="Navegacao tecnica">
        <a href="/">Inicio</a>
        <div class="links">
          <a href="/status">Status</a>
          <a href="/networks">Redes</a>
          <a href="/ota">OTA</a>
          <a href="/settings">Ajustes</a>
          <a href="/logs">Logs</a>
        </div>
      </nav>

      <header>
        <div>
          <h1>Ajustes Tecnicos</h1>
          <p class="subtle" id="settingsStatus">Ultima atualizacao: --</p>
        </div>
        <div class="actions">
          <button class="secondary" type="button" onclick="loadAll()">Atualizar</button>
          <button class="secondary" type="button" onclick="exportSettings()">Exportar</button>
        </div>
      </header>

      <details open>
        <summary>Conectividade</summary>
        <div class="content">
          <div class="grid">
            <div>
              <label for="wifiProvisioningSsid">SSID provisioning AP</label>
              <input id="wifiProvisioningSsid" maxlength="32" autocomplete="off">
            </div>
            <div>
              <label for="wifiStaMaxRetry">Retry maximo STA</label>
              <input id="wifiStaMaxRetry" type="number" min="1" max="20" value="3">
            </div>
            <div>
              <label for="wifiApstaPolicy">Politica APSTA</label>
              <select id="wifiApstaPolicy">
                <option value="0">Always on</option>
                <option value="1">Auto timeout</option>
                <option value="2">STA only</option>
              </select>
            </div>
            <div>
              <label for="wifiApstaGrace">Janela APSTA (s)</label>
              <input id="wifiApstaGrace" type="number" min="30" max="3600" value="600">
            </div>
            <button type="button" onclick="saveDeviceConnectivity()">Salvar conectividade</button>
            <button class="secondary" type="button" onclick="resetDeviceConnectivity()">Reset defaults</button>
          </div>
          <div class="readout" id="wifiReadout">Wi-Fi: --</div>
        </div>
      </details>

      <details>
        <summary>Sistema</summary>
        <div class="content">
          <div class="readout" id="systemReadout">Sistema: --</div>
          <button class="danger" type="button" onclick="restartDevice()">Restart</button>
        </div>
      </details>

      <div id="banner" class="banner"></div>
    </main>

    <script>
      const CONFIG_IDS = {
        provisioningSsid: "wifi.provisioning_ssid",
        staMaxRetry: "wifi.sta_max_retry",
        apstaPolicy: "wifi.apsta_policy",
        apstaGrace: "wifi.apsta_grace_period_s",
      };

      let configFieldsById = {};

      function showBanner(kind, text) {
        const el = document.getElementById("banner");
        el.className = "banner show " + kind;
        el.textContent = text;
      }

      function sdkconfigString(value) {
        return JSON.stringify(String(value || ""));
      }

      function fieldValue(id, fallback) {
        const field = configFieldsById[id] || {};
        if (field.value_hidden) {
          return fallback;
        }
        return field.value !== undefined ? field.value : fallback;
      }

      function fieldDefault(id, fallback) {
        const field = configFieldsById[id] || {};
        if (field.default_hidden) {
          return fallback;
        }
        return field.default !== undefined ? field.default : fallback;
      }

      function fieldNumber(id, fallback) {
        return Number(fieldValue(id, fallback));
      }

      function fieldString(id, fallback) {
        return String(fieldValue(id, fallback) || "");
      }

      function fieldHasFlag(field, flag) {
        return Array.isArray(field && field.flags) &&
          field.flags.some((entry) => entry && entry.flag === flag);
      }

      function buildMenuconfigDefaults() {
        const lines = [
          "# Exportado por /settings",
          "CONFIG_WIFI_STA_MAX_RETRY=" + Math.round(fieldNumber(CONFIG_IDS.staMaxRetry, 0)),
          "CONFIG_WIFI_APSTA_POLICY=" + Math.round(fieldNumber(CONFIG_IDS.apstaPolicy, 0)),
          "CONFIG_WIFI_APSTA_GRACE_PERIOD_S=" + Math.round(fieldNumber(CONFIG_IDS.apstaGrace, 0)),
        ];

        const ssidField = configFieldsById[CONFIG_IDS.provisioningSsid] || {};
        const provisioningSsid = fieldString(CONFIG_IDS.provisioningSsid, "");
        if (ssidField.value_hidden) {
          lines.push("# CONFIG_WIFI_PROVISIONING_SSID oculto por politica de build");
        } else if (provisioningSsid) {
          lines.push("CONFIG_WIFI_PROVISIONING_SSID=" + sdkconfigString(provisioningSsid));
        }

        return {
          lines,
          text: lines.join("\n") + "\n",
        };
      }

      function downloadTextFile(fileName, text) {
        const blob = new Blob([text], { type: "application/json;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      async function exportSettings() {
        try {
          const [configResp, statusResp] = await Promise.all([
            fetch("/api/config/meta", { cache: "no-store" }),
            fetch("/api/status", { cache: "no-store" }),
          ]);

          if (!configResp.ok || !statusResp.ok) {
            throw new Error("export");
          }

          const configData = await configResp.json();
          const statusData = await statusResp.json();
          indexConfigFields(configData);
          const menuconfig = buildMenuconfigDefaults();
          const timestamp = new Date().toISOString();
          const safeTimestamp = timestamp.replace(/[:.]/g, "-");
          const exportPayload = {
            exported_at: timestamp,
            source: "/settings",
            firmware_version: statusData.firmware_version || "--",
            config_manifest: configData,
            menuconfig_defaults_preview: menuconfig.lines,
            menuconfig_defaults_text: menuconfig.text,
          };

          downloadTextFile("settings-export-" + safeTimestamp + ".json", JSON.stringify(exportPayload, null, 2));
          showBanner("ok", "Configuracoes exportadas.");
        } catch (err) {
          showBanner("error", "Falha ao exportar configuracoes.");
        }
      }

      function indexConfigFields(configData) {
        configFieldsById = {};
        (configData.fields || []).forEach((field) => {
          if (field && field.id) {
            configFieldsById[field.id] = field;
          }
        });
      }

      function renderApstaChoices(field) {
        const select = document.getElementById("wifiApstaPolicy");
        const choices = Array.isArray(field && field.choices) ? field.choices : [];
        if (!choices.length) {
          return;
        }

        select.innerHTML = "";
        choices.forEach((choice) => {
          const option = document.createElement("option");
          option.value = String(choice.value);
          option.textContent = choice.label || String(choice.value);
          select.appendChild(option);
        });
      }

      function clampNumber(value, min, max, fallback) {
        const parsed = Number(value);
        if (!Number.isFinite(parsed)) {
          return fallback;
        }
        return Math.max(min, Math.min(max, parsed));
      }

      async function loadAll() {
        try {
          const [configResp, statusResp] = await Promise.all([
            fetch("/api/config/meta", { cache: "no-store" }),
            fetch("/api/status", { cache: "no-store" }),
          ]);

          if (!configResp.ok || !statusResp.ok) {
            throw new Error("load");
          }

          const configData = await configResp.json();
          const status = await statusResp.json();
          indexConfigFields(configData);

          const ssidField = configFieldsById[CONFIG_IDS.provisioningSsid] || {};
          const retryField = configFieldsById[CONFIG_IDS.staMaxRetry] || {};
          const policyField = configFieldsById[CONFIG_IDS.apstaPolicy] || {};
          const graceField = configFieldsById[CONFIG_IDS.apstaGrace] || {};

          renderApstaChoices(policyField);

          document.getElementById("settingsStatus").textContent =
            "Ultima atualizacao: " + new Date().toLocaleTimeString();
          document.getElementById("wifiProvisioningSsid").value = fieldString(CONFIG_IDS.provisioningSsid, "");
          document.getElementById("wifiProvisioningSsid").disabled =
            !!ssidField.value_hidden || fieldHasFlag(ssidField, "read_only");
          document.getElementById("wifiProvisioningSsid").placeholder =
            ssidField.value_hidden ? "Oculto por politica de build" : "";
          document.getElementById("wifiStaMaxRetry").min = retryField.min !== undefined ? retryField.min : 1;
          document.getElementById("wifiStaMaxRetry").max = retryField.max !== undefined ? retryField.max : 20;
          document.getElementById("wifiStaMaxRetry").value = fieldNumber(CONFIG_IDS.staMaxRetry, 3);
          document.getElementById("wifiApstaPolicy").value =
            String(fieldValue(CONFIG_IDS.apstaPolicy, 1));
          document.getElementById("wifiApstaGrace").min = graceField.min !== undefined ? graceField.min : 30;
          document.getElementById("wifiApstaGrace").max = graceField.max !== undefined ? graceField.max : 3600;
          document.getElementById("wifiApstaGrace").value = fieldNumber(CONFIG_IDS.apstaGrace, 600);
          document.getElementById("wifiReadout").textContent =
            "Provisioning SSID " + (ssidField.value_hidden ? "oculto" : (fieldString(CONFIG_IDS.provisioningSsid, "") || "--")) +
            " | retry " + Number(status.wifi_sta_max_retry || 0) +
            " | politica APSTA " + Number(status.wifi_apsta_policy || 0) +
            " | grace " + Number(status.wifi_apsta_grace_period_s || 0) + " s";
          document.getElementById("systemReadout").textContent =
            "Firmware " + (status.firmware_version || "--") +
            " | IP " + (status.ip || "--") +
            " | Wi-Fi " + (status.wifi_ready ? "pronto" : status.state || "--");
        } catch (err) {
          document.getElementById("settingsStatus").textContent = "Ultima atualizacao: indisponivel";
        }
      }

      async function setConfigValue(id, value) {
        const resp = await fetch("/api/config/set", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id, value }),
        });
        const result = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          throw new Error(result.error || "config_set_failed");
        }
        return result;
      }

      async function resetConfigValue(id) {
        const resp = await fetch("/api/config/reset", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ id }),
        });
        const result = await resp.json().catch(() => ({}));
        if (!resp.ok) {
          throw new Error(result.error || "config_reset_failed");
        }
        return result;
      }

      async function saveDeviceConnectivity() {
        const provisioningSsid = document.getElementById("wifiProvisioningSsid").value.trim();
        const retryField = configFieldsById[CONFIG_IDS.staMaxRetry] || {};
        const graceField = configFieldsById[CONFIG_IDS.apstaGrace] || {};
        const updates = [
          [CONFIG_IDS.staMaxRetry,
           Math.round(clampNumber(document.getElementById("wifiStaMaxRetry").value,
                                  retryField.min !== undefined ? retryField.min : 1,
                                  retryField.max !== undefined ? retryField.max : 20,
                                  fieldDefault(CONFIG_IDS.staMaxRetry, 3)))],
          [CONFIG_IDS.apstaPolicy, Number(document.getElementById("wifiApstaPolicy").value || 1)],
          [CONFIG_IDS.apstaGrace,
           Math.round(clampNumber(document.getElementById("wifiApstaGrace").value,
                                  graceField.min !== undefined ? graceField.min : 30,
                                  graceField.max !== undefined ? graceField.max : 3600,
                                  fieldDefault(CONFIG_IDS.apstaGrace, 600)))],
        ];

        if (provisioningSsid && !document.getElementById("wifiProvisioningSsid").disabled) {
          updates.unshift([CONFIG_IDS.provisioningSsid, provisioningSsid]);
        }

        try {
          const results = [];
          for (const [id, value] of updates) {
            results.push(await setConfigValue(id, value));
          }
          const requiresReboot = results.some((result) => result.requires_reboot);
          showBanner("ok",
                     requiresReboot ?
                     "Conectividade salva. Alguns campos recomendam reboot." :
                     "Conectividade salva.");
          loadAll();
        } catch (err) {
          showBanner("error", "Falha ao salvar conectividade: " + (err.message || "--"));
        }
      }

      async function resetDeviceConnectivity() {
        if (!confirm("Restaurar defaults de conectividade?")) {
          return;
        }

        try {
          const ids = [
            CONFIG_IDS.provisioningSsid,
            CONFIG_IDS.staMaxRetry,
            CONFIG_IDS.apstaPolicy,
            CONFIG_IDS.apstaGrace,
          ];
          const results = [];
          for (const id of ids) {
            results.push(await resetConfigValue(id));
          }
          const requiresReboot = results.some((result) => result.requires_reboot);
          showBanner("ok",
                     requiresReboot ?
                     "Defaults restaurados. Alguns campos recomendam reboot." :
                     "Defaults restaurados.");
          loadAll();
        } catch (err) {
          showBanner("error", "Falha ao restaurar defaults: " + (err.message || "--"));
        }
      }

      async function restartDevice() {
        if (!confirm("Reiniciar a placa agora?")) {
          return;
        }
        const resp = await fetch("/api/restart", { method: "POST" });
        const text = await resp.text();
        showBanner(resp.ok ? "ok" : "error", resp.ok ? "Restart solicitado." : text);
      }

      loadAll();
    </script>
  </body>
</html>
